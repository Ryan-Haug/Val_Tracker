<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vandalytics - Stats for Valorant</title>

  <link rel="stylesheet" href="./styles/main.css" />
  <link rel="icon" href="./images/favicon.ico" type="image/x-icon" />
</head>

<body>
  <header>
    <section>
      <h1>VANDALYTICS</h1>
      <div>
        <h3>ASCENDENT 1</h3>
        <p>1818 ELO</p>
        <p class="badgeWin">18rr</p>
      </div>

      <p>User: chos3n#50hs</p>
      <p>Key: HDEV-cd12...</p>
    </section>

    <section>
      <button>CHANGE USER</button>
      <button>CHANGE API KEY</button>
      <button class="warn">CLEAR DATA</button>
    </section>
  </header>

  <body>
    <main>
      <aside>
        <h2>Quick Stats · ...</h2>

        <div id="quickStats">
          <div>
            <p>Winrate</p>
            <h3>45%</h3>
          </div>
          <div>
            <p>W/L</p>
            <h3>13/9</h3>
          </div>
          <div>
            <p>Total Kills</p>
            <h3>310</h3>
          </div>
          <div>
            <p>Total Deaths</p>
            <h3>308</h3>
          </div>
          <div>
            <p>Average RR change</p>
            <h3>-17</h3>
          </div>
          <div>
            <p>W/L Streak</p>
            <h3>1</h3>
          </div>
          <div>
            <p>Average Rounds</p>
            <h3>18.2</h3>
          </div>
          <div>
            <p>Round Participation</p>
            <h3>80%</h3>
          </div>
        </div>
      </aside>

      <section id="graphs">
        <h2>graphs · ...</h2>
      </section>

      <section id="games">
        <h2>Games · ...</h2>

        <div id="sortButtons">
          <button>Sort: RR</button>
          <button>Sort: K/D</button>
          <button>Sort: HS%</button>
          <button>wins</button>
          <button>Losses</button>
        </div>

        <div id="gameCont">
          <p>Loading...</p>
        </div>
      </section>
    </main>
  </body>


  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="./scripts/main.js" defer></script>
</body>

</html>
