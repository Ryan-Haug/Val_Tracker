<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vandalytics</title>

    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="icon" href="./images/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <div id="login">
      <h1>log in</h1>
      <hr />

      <form>
        <input
          type="text"
          id="userInp"
          autocomplete="off"
          placeholder="Username ex: 'chos3n'"
        />
        <input
          type="text"
          id="tagInp"
          autocomplete="off"
          placeholder="Tagline ex: '50hs'"
        />
        <input
          type="text"
          id="ApiInp"
          autocomplete="off"
          placeholder="* API key"
        />

        <p id="formError" style="display: none; color: red"></p>
        <button id="submitBtn">Submit</button>
        <p>
          * For an API key please visit
          <a href="https://api.henrikdev.xyz/dashboard/api-keys" target="_blank"
            >this website</a
          >
        </p>
      </form>
    </div>

    <div id="alert" style="display: none">
      <div>
        <h2 id="errorHead"></h2>
        <p id="errorBody"></p>

        <button onclick="toggleError()">Okay</button>
      </div>
    </div>

    <header id="head" style="display: none">
      <div>
        <h1>Vandalytics</h1>
        <p id="userDisp" class="active">User: N/A</p>
        <p id="apiDisp" class="active">Key: N/A</p>
      </div>

      <div>
        <button>Change User</button>
        <button>Change Api Key</button>
        <button style="background-color: red" onclick="clearData()">
          Clear Data
        </button>
      </div>
    </header>

    <main id="main" style="display: none">
      <section id="quick">
        <h2 id="quickHead">Quick Stats | ...</h2>
        <div>
          <div>
            <p>Winrate</p>
            <p>--</p>
          </div>
          <div>
            <p>Average Kd</p>
            <p>--</p>
          </div>
          <div>
            <p>Average Acs</p>
            <p>--</p>
          </div>
          <div>
            <p>average HS%</p>
            <p>--</p>
          </div>
          <div>
            <p>average RR change</p>
            <p>--</p>
          </div>
          <div>
            <p>W/L streak</p>
            <p>--</p>
          </div>
          <div>
            <p>average rounds</p>
            <p>--</p>
          </div>
          <div>
            <p>Round Participation</p>
            <p>--</p>
          </div>
        </div>
      </section>

      <section id="games">
        <h2 id="gameHead">Games | ...</h2>
        <div id="cardCont">
          <p style="color: grey;">Loading ...</p>
      </section>
    </main>

    <script src="./scripts/main.js" defer></script>
    <script src="./scripts/login.js" defer></script>
  </body>
</html>
