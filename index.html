<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Val Tracker?</title>
    <link rel="stylesheet" href="./styles/main.css" />
</head>

<body>
    <div style="display: none;">
        <h1>log in</h1>
    </div>

    <header>
        <div>
            <h1>Valorant Stats</h1>
            <p>User - N/A</p>
        </div>

        <div>
            <button>Change User</button>
            <button>Change Api Key</button>
        </div>
    </header>

    <main>
        <section id="quick">
            <h2>Quick Stats</h2>
            <div>
                <p>Rank - N/A</p>
                <p>Total Games - N/A</p>
                <p>Win Percent - N/A</p>
                <p>Avg Gain/Loss - N/A</p>
            </div>
        </section>

        <section id="games">
            <h2>Games</h2>
            <div class="cardCont">
                <div class="card">
                    <div class="cardHeader">
                        <div>
                            <h3>Map</h3>
                            <p>RR</p>
                        </div>
                        <p style="font-size: .8em;">date</p>
                    </div>

                    <div class="cardBody">
                        <div>
                            <h5>Rank</h5>
                            <p>Immortal 1</p>
                        </div>
                        <div>
                            <h5>Match Id</h5>
                            <p>asdfhjaksdhjfklajshdflkashdfkljahsdflkjh</p>
                        </div>
                        <div>
                            <h5>Total RR</h5>
                            <p>2134</p>
                        </div>
                        <div>
                            <h5>RR Change</h5>
                            <p>18</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="./scripts/main.js" defer></script>
</body>

</html>
